workflows:
  ios-driver-adhoc:
    name: Orest Driver iOS — Ad-hoc IPA
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      # The `signing` group holds:
      #   APP_STORE_CONNECT_KEY_IDENTIFIER (.p8 key id)
      #   APP_STORE_CONNECT_ISSUER_ID
      #   APP_STORE_CONNECT_PRIVATE_KEY (the .p8 file contents)
      #   CERTIFICATE_PRIVATE_KEY (RSA private key for IPA signing)
      # Driving ASC auth ourselves means we drop the
      # integrations.app_store_connect block — declaring `groups:`
      # was suppressing the integration's auto-injected env vars
      # and causing ASC API 401s in builds #14-16.
      groups:
        - signing
      vars:
        XCODE_PROJECT: "ios/App/App.xcodeproj"
        XCODE_SCHEME: "App"
        BUNDLE_ID: "com.orestexpress.driver"
      node: 22
      xcode: latest
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
    scripts:
      - name: Install npm dependencies
        script: npm ci
      - name: Capacitor sync
        script: npx cap sync ios
      - name: Inject GoogleService-Info.plist if provided
        script: |
          if [ -n "$GOOGLE_SERVICES_PLIST" ]; then
            printf '%s' "$GOOGLE_SERVICES_PLIST" > ios/App/App/GoogleService-Info.plist
            echo "Wrote GoogleService-Info.plist ($(wc -c < ios/App/App/GoogleService-Info.plist) bytes)"
          else
            echo "GOOGLE_SERVICES_PLIST env var not set — Firebase will be inactive in this build"
          fi
      - name: Stamp build number from CI
        script: |
          cd ios/App
          BUILD_NUM=$(($(date +%s) / 60))
          xcrun agvtool new-version -all $BUILD_NUM
      - name: Fetch signing files (cert + provisioning profile)
        script: |
          # Explicit signing path — bypasses the magic `ios_signing:` block
          # which kept failing with "no matching profiles" even though the
          # profile T7JTY4JRFW (Ad Hoc) is live and bound to the bundle ID.
          # The --create flag lets the CLI provision a fresh profile if one
          # doesn't already exist, using our Admin-role API key.
          # CERTIFICATE_PRIVATE_KEY env var holds an RSA private key that
          # we generated and uploaded as a Codemagic Secret. The CLI
          # signs a CSR with this key, asks ASC to mint a fresh
          # IOS_DISTRIBUTION cert from it, and reuses the same private
          # key on disk for IPA signing. --create also forces a fresh
          # provisioning profile that includes all current bundle ID
          # capabilities (push notifications, etc.).
          app-store-connect fetch-signing-files \
            "$BUNDLE_ID" \
            --type IOS_APP_ADHOC \
            --certificate-key=@env:CERTIFICATE_PRIVATE_KEY \
            --create
          keychain initialize
          keychain add-certificates
          xcode-project use-profiles
      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      email:
        recipients:
          - jaroslavpospisil@icloud.com
        notify:
          success: true
          failure: true

  ios-driver-testflight:
    name: Orest Driver iOS — TestFlight
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      # The `signing` group holds:
      #   APP_STORE_CONNECT_KEY_IDENTIFIER (.p8 key id)
      #   APP_STORE_CONNECT_ISSUER_ID
      #   APP_STORE_CONNECT_PRIVATE_KEY (the .p8 file contents)
      #   CERTIFICATE_PRIVATE_KEY (RSA private key for IPA signing)
      # Driving ASC auth ourselves means we drop the
      # integrations.app_store_connect block — declaring `groups:`
      # was suppressing the integration's auto-injected env vars
      # and causing ASC API 401s in builds #14-16.
      groups:
        - signing
      vars:
        XCODE_PROJECT: "ios/App/App.xcodeproj"
        XCODE_SCHEME: "App"
        BUNDLE_ID: "com.orestexpress.driver"
      node: 22
      xcode: latest
    scripts:
      - name: Install npm dependencies
        script: npm ci
      - name: Capacitor sync
        script: npx cap sync ios
      - name: Inject GoogleService-Info.plist if provided
        script: |
          if [ -n "$GOOGLE_SERVICES_PLIST" ]; then
            printf '%s' "$GOOGLE_SERVICES_PLIST" > ios/App/App/GoogleService-Info.plist
            echo "Wrote GoogleService-Info.plist ($(wc -c < ios/App/App/GoogleService-Info.plist) bytes)"
          else
            echo "GOOGLE_SERVICES_PLIST env var not set — Firebase will be inactive in this build"
          fi
      - name: Stamp build number from CI
        script: |
          cd ios/App
          BUILD_NUM=$(($(date +%s) / 60))
          xcrun agvtool new-version -all $BUILD_NUM
      - name: Fetch signing files (cert + provisioning profile)
        script: |
          app-store-connect fetch-signing-files \
            "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --certificate-key=@env:CERTIFICATE_PRIVATE_KEY \
            --create
          keychain initialize
          keychain add-certificates
          xcode-project use-profiles
      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME"
      - name: Publish IPA to App Store Connect (TestFlight)
        script: |
          # Test Information has been populated (feedback email,
          # reviewer contact, demo creds 7737444848 / 8186, privacy
          # URL). The --testflight flag now auto-submits each build
          # to Apple beta review and pushes it to the
          # "Drivers (External)" public-link group when approved.
          app-store-connect publish \
            --path "build/ios/ipa/App.ipa" \
            --testflight \
            --skip-package-validation
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      email:
        recipients:
          - jaroslavpospisil@icloud.com
        notify:
          success: true
          failure: true

  android-driver-release:
    name: Orest Driver Android — Release APK
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      groups:
        - signing  # ANDROID_KEYSTORE_B64, ANDROID_KEYSTORE_PASSWORD, ANDROID_KEY_PASSWORD, ANDROID_KEY_ALIAS
      vars:
        BUNDLE_ID: "com.orestexpress.driver"
      node: 22
      java: 21
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
    scripts:
      - name: Install npm dependencies
        script: npm ci
      - name: Capacitor sync (Android)
        script: npx cap sync android
      - name: Inject google-services.json if provided
        script: |
          # Optional: paste the firebase google-services.json contents
          # into Codemagic env var GOOGLE_SERVICES_JSON (Secret) for
          # FCM push to activate. Without it the app still installs
          # but native push is inactive (matches the iOS path).
          if [ -n "$GOOGLE_SERVICES_JSON" ]; then
            printf '%s' "$GOOGLE_SERVICES_JSON" > android/app/google-services.json
            echo "Wrote google-services.json"
          else
            echo "GOOGLE_SERVICES_JSON env var not set — Firebase will be inactive"
          fi
      - name: Decode keystore from env
        script: |
          # Codemagic mounts ANDROID_KEYSTORE_B64 (Secret) — drop the
          # decoded keystore at android/app/release.keystore and tell
          # gradle where it lives via ANDROID_KEYSTORE_PATH.
          echo "$ANDROID_KEYSTORE_B64" | base64 -d > android/app/release.keystore
          echo "Decoded keystore: $(wc -c < android/app/release.keystore) bytes"
      - name: Stamp build number
        script: |
          # versionCode must monotonically increase across uploads to
          # Google Play. Use Codemagic's $BUILD_NUMBER (auto-incrementing
          # per app) — gradle reads this in build.gradle.
          echo "BUILD_NUMBER=$BUILD_NUMBER"
      - name: Build signed release APK + AAB
        script: |
          cd android
          export ANDROID_KEYSTORE_PATH="$CM_BUILD_DIR/orest-driver-mobile/android/app/release.keystore"
          [ -f "$ANDROID_KEYSTORE_PATH" ] || export ANDROID_KEYSTORE_PATH="$(pwd)/app/release.keystore"
          ls -la "$ANDROID_KEYSTORE_PATH" || { echo "keystore not found"; exit 1; }
          # APK = sideload at orestexpress.online/orest-driver.apk.
          # AAB = Google Play upload format (required since Aug 2021).
          ./gradlew :app:assembleRelease :app:bundleRelease --no-daemon
          ls -la app/build/outputs/apk/release/
          ls -la app/build/outputs/bundle/release/
    artifacts:
      - android/app/build/outputs/apk/release/*.apk
      - android/app/build/outputs/bundle/release/*.aab
    publishing:
      email:
        recipients:
          - jaroslavpospisil@icloud.com
        notify:
          success: true
          failure: true
      google_play:
        # Service account JSON uploaded to Codemagic as Secret
        # GCLOUD_SERVICE_ACCOUNT_CREDENTIALS in the `signing` group.
        # SA email: codemagic-play-publisher@orest-driver-publishing.iam.gserviceaccount.com
        # Granted in Play Console → API access → Driver app:
        #   - Release apps to testing tracks
        #   - Manage testing tracks and edit tester lists
        # Track values: internal | alpha (closed) | beta (open) | production.
        credentials: $GCLOUD_SERVICE_ACCOUNT_CREDENTIALS
        track: internal
        release_status: completed
        in_app_update_priority: 0
