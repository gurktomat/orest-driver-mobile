workflows:
  ios-driver-adhoc:
    name: Orest Driver iOS — Ad-hoc IPA
    instance_type: mac_mini_m2
    max_build_duration: 60
    integrations:
      app_store_connect: codemagic-asc-api-key
    environment:
      # Per Codemagic docs: omitting `groups:` loads ALL groups by default,
      # which means the app_store_connect integration's auto-injected env
      # vars AND our `signing` group's CERTIFICATE_PRIVATE_KEY both load.
      # Build #14/15 (with explicit groups: [default|signing]) failed with
      # ASC API 401 because explicit groups suppress integration injection.
      vars:
        XCODE_PROJECT: "ios/App/App.xcodeproj"
        XCODE_SCHEME: "App"
        BUNDLE_ID: "com.orestexpress.driver"
      node: 22
      xcode: latest
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
    scripts:
      - name: Install npm dependencies
        script: npm ci
      - name: Capacitor sync
        script: npx cap sync ios
      - name: Inject GoogleService-Info.plist if provided
        script: |
          if [ -n "$GOOGLE_SERVICES_PLIST" ]; then
            printf '%s' "$GOOGLE_SERVICES_PLIST" > ios/App/App/GoogleService-Info.plist
            echo "Wrote GoogleService-Info.plist ($(wc -c < ios/App/App/GoogleService-Info.plist) bytes)"
          else
            echo "GOOGLE_SERVICES_PLIST env var not set — Firebase will be inactive in this build"
          fi
      - name: Stamp build number from CI
        script: |
          cd ios/App
          BUILD_NUM=$(($(date +%s) / 60))
          xcrun agvtool new-version -all $BUILD_NUM
      - name: Fetch signing files (cert + provisioning profile)
        script: |
          # Explicit signing path — bypasses the magic `ios_signing:` block
          # which kept failing with "no matching profiles" even though the
          # profile T7JTY4JRFW (Ad Hoc) is live and bound to the bundle ID.
          # The --create flag lets the CLI provision a fresh profile if one
          # doesn't already exist, using our Admin-role API key.
          # CERTIFICATE_PRIVATE_KEY env var holds an RSA private key that
          # we generated and uploaded as a Codemagic Secret. The CLI
          # signs a CSR with this key, asks ASC to mint a fresh
          # IOS_DISTRIBUTION cert from it, and reuses the same private
          # key on disk for IPA signing. --create also forces a fresh
          # provisioning profile that includes all current bundle ID
          # capabilities (push notifications, etc.).
          app-store-connect fetch-signing-files \
            "$BUNDLE_ID" \
            --type IOS_APP_ADHOC \
            --certificate-key=@env:CERTIFICATE_PRIVATE_KEY \
            --create
          keychain initialize
          keychain add-certificates
          xcode-project use-profiles
      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      email:
        recipients:
          - jaroslavpospisil@icloud.com
        notify:
          success: true
          failure: true

  ios-driver-testflight:
    name: Orest Driver iOS — TestFlight
    instance_type: mac_mini_m2
    max_build_duration: 60
    integrations:
      app_store_connect: codemagic-asc-api-key
    environment:
      # Per Codemagic docs: omitting `groups:` loads ALL groups by default,
      # which means the app_store_connect integration's auto-injected env
      # vars AND our `signing` group's CERTIFICATE_PRIVATE_KEY both load.
      # Build #14/15 (with explicit groups: [default|signing]) failed with
      # ASC API 401 because explicit groups suppress integration injection.
      vars:
        XCODE_PROJECT: "ios/App/App.xcodeproj"
        XCODE_SCHEME: "App"
        BUNDLE_ID: "com.orestexpress.driver"
      node: 22
      xcode: latest
    scripts:
      - name: Install npm dependencies
        script: npm ci
      - name: Capacitor sync
        script: npx cap sync ios
      - name: Inject GoogleService-Info.plist if provided
        script: |
          if [ -n "$GOOGLE_SERVICES_PLIST" ]; then
            printf '%s' "$GOOGLE_SERVICES_PLIST" > ios/App/App/GoogleService-Info.plist
            echo "Wrote GoogleService-Info.plist ($(wc -c < ios/App/App/GoogleService-Info.plist) bytes)"
          else
            echo "GOOGLE_SERVICES_PLIST env var not set — Firebase will be inactive in this build"
          fi
      - name: Stamp build number from CI
        script: |
          cd ios/App
          BUILD_NUM=$(($(date +%s) / 60))
          xcrun agvtool new-version -all $BUILD_NUM
      - name: Fetch signing files (cert + provisioning profile)
        script: |
          app-store-connect fetch-signing-files \
            "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --certificate-key=@env:CERTIFICATE_PRIVATE_KEY \
            --create
          keychain initialize
          keychain add-certificates
          xcode-project use-profiles
      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      email:
        recipients:
          - jaroslavpospisil@icloud.com
        notify:
          success: true
          failure: true
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        # beta_groups intentionally omitted for first build —
        # tester management happens manually in App Store Connect → TestFlight UI.
        # Once an "Internal Testers" group exists there, add it back here.
